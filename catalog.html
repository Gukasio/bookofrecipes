<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Каталог рецептов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container d-flex flex-column flex-md-row align-items-center">
            <a class="navbar-brand text-info fw-bold mb-2 mb-md-0" href="index.html">Рецепты от Армянина</a>
            
            <div class="navbar-nav flex-row gap-4">
                <a class="nav-link" href="index.html">Главное меню</a>
                <a class="nav-link" href="catalog.html">Каталог Рецептов</a>
                <a class="nav-link text-warning" href="cartrecipes.html">Корзина (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="text-center mb-5">Каталог рецептов</h1>

        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="card bg-dark text-white border-secondary h-100">
                    <img src="img/shashlik.jpeg" class="card-img-top" alt="Мясо" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Шашлык Сочнейший</h5>
                        <a href="recipe_shash.html" class="btn btn-outline-info mt-auto">Смотреть рецепт</a>
                        <button class="btn btn-success mt-2" onclick="addToCart('Шашлык Сочнейший')">В корзину</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-dark text-white border-secondary h-100">
                    <img src="img/baklazhan.jpg" class="card-img-top" alt="Закуски" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Баклажановые рулетики</h5>
                        <a href="recipe_bakl.html" class="btn btn-outline-info mt-auto">Смотреть рецепт</a>
                        <button class="btn btn-success mt-2" onclick="addToCart('Баклажановые рулетики')">В корзину</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-dark text-white border-secondary h-100">
                    <img src="img/tolma.jpeg" class="card-img-top" alt="Основное блюдо" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Толма</h5>
                        <a href="recipe_tolma.html" class="btn btn-outline-info mt-auto">Смотреть рецепт</a>
                        <button class="btn btn-success mt-2" onclick="addToCart('Толма')">В корзину</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="container text-center mt-5 py-3 border-top border-secondary">
        <small class="text-white-50">© Все права защищены</small>
    </footer>
    <script src="cart.js"></script>
</body>
</html>
